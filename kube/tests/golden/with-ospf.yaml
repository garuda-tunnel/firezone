# Source: firezone/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: firezone-env
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: firezone
    app.kubernetes.io/instance: "firezone"
    app.kubernetes.io/managed-by: Helm
    garuda.managed-by: helm
type: Opaque
stringData:
  # Firezone Phoenix application env. This Secret is the source of truth for the firezone
  # container's environment (rendered directly from Helm values).
  EXTERNAL_URL: "https://hub.example.net"
  DEFAULT_ADMIN_EMAIL: "admin@example.net"
  DEFAULT_ADMIN_PASSWORD: "fixture-password"
  WIREGUARD_IPV4_NETWORK: "198.51.100.128/25"
  WIREGUARD_IPV4_ADDRESS: "198.51.100.129"
  FZ_PORT: "13000"
  WIREGUARD_PORT: "51620"
  PHOENIX_SECURE_COOKIES: "true"
  TELEMETRY_ENABLED: "false"
  WIREGUARD_IPV4_MASQUERADE: "false"
  WIREGUARD_IPV6_MASQUERADE: "false"
  GUARDIAN_SECRET_KEY: "fixture-guardian"
  SECRET_KEY_BASE: "fixture-secret-key-base"
  LIVE_VIEW_SIGNING_SALT: "fixture-live-view"
  COOKIE_SIGNING_SALT: "fixture-sign"
  COOKIE_ENCRYPTION_SALT: "fixture-encrypt"
  DATABASE_ENCRYPTION_KEY: "fixture-database-encryption"
  # Postgres connection. The chart provisions a single postgres container
  # in the same pod, reachable on 127.0.0.1 since both containers share
  # the pod's network namespace.
  DATABASE_HOST: "127.0.0.1"
  DATABASE_NAME: "firezone"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "fixture-database-password"
  POSTGRES_DB: "firezone"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "fixture-database-password"

---
# Source: firezone/templates/configmap-frr.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: "firezone-frr"
  namespace: "garuda"
data:
  frr.conf: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    interface wg-firezone
     ip ospf area 0.0.0.0
    ip ospf hello-interval 5
     ip ospf dead-interval 15
     ip ospf mtu-ignore
    router ospf
     ospf router-id 198.51.100.22
    redistribute connected
    
  daemons: |
    zebra=yes
    ospfd=yes
  vtysh.conf: |
    service integrated-vtysh-config

