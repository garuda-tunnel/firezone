---
# Source: firezone/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "firezone"
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: firezone
    app.kubernetes.io/instance: "firezone"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
spec:
  # Recreate: postgres lockfiles and firezone runtime state in the
  # hostPath volume do not tolerate parallel pods, which RollingUpdate
  # would briefly create on a replacement.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: firezone
      app.kubernetes.io/instance: "firezone"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firezone
        app.kubernetes.io/instance: "firezone"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: garuda
        garuda.managed-by: helm
      annotations:
        k8s.v1.cni.cncf.io/networks: "backbone@backbone,border@border"
        checksum/env-secret: f74094ed92c2d250b3cfbb400df85dfc86157dc3317a488f279040473ebb6470
        checksum/oidc-secret: df06c5771bfee8f263765a4ba98491e51bf02916a272368268bc857f3aa895b8
        checksum/oidc-reconcile: 5a606f9ad55bb3afe06a94781ddf0090d68568f8474c5faa42e9b3dc5e3bc0a0
    spec:
      restartPolicy: Always
      shareProcessNamespace: true
      # Match the existing docker-compose stack's sysctls. All three are
      # flagged "unsafe" by upstream kubelet and must be allow-listed at
      # k3s install time via
      # `--kubelet-arg=allowed-unsafe-sysctls=net.ipv4.ip_forward,...`.
      # See examples/mini-site/infra/yc.tf module "k3s_init_hub" for the
      # operator-side wiring.
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      volumes:
        # Persistent runtime state for both the Phoenix application and
        # postgres. Backed by the YC data disk re-attached after VM
        # replacement.
        - name: firezone-data
          hostPath:
            path: "/opt/garuda/firezone/firezone-data"
            type: DirectoryOrCreate
        - name: postgres-data
          hostPath:
            path: "/opt/garuda/firezone/postgres-data"
            type: DirectoryOrCreate
        - name: oidc-reconcile-script
          configMap:
            name: firezone-oidc-reconcile
      containers:
        - name: firezone
          image: "ghcr.io/garuda-tunnel/garuda-firezone:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: firezone-env
          ports:
            # Internal admin/Phoenix port. Backed by the ClusterIP
            # Service consumed by the Traefik IngressRoute.
            - name: admin-ui
              containerPort: 13000
              protocol: TCP
            # External WireGuard server endpoint. Exposed on the node
            # via hostPort so clients can reach it on the public IP of
            # the hub VM. Single-pod stack (Recreate strategy) means
            # there is no hostPort scheduling conflict.
            - name: wg
              containerPort: 51620
              hostPort: 51620
              protocol: UDP
          volumeMounts:
            - name: firezone-data
              mountPath: /var/firezone
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
        - name: postgres
          image: "postgres:15"
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: firezone-env
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /usr/bin/pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: oidc-reconcile
          image: "python:3.12-slim-bookworm"
          imagePullPolicy: IfNotPresent
          command: ["python3", "/opt/oidc-reconcile/oidc_reconcile.py"]
          env:
            - name: OIDC_MANAGED
              value: "merge"
            - name: FZ_API_URL
              value: "http://127.0.0.1:13000"
            - name: FZ_RELEASE_DIR
              value: "/app"
          # firezone-env is REQUIRED, not over-broad: the nsenter-launched
          # bin/create-api-token (eval mode) inherits this env and needs
          # DATABASE_*/secrets to spawn a BEAM that reaches Postgres.
          envFrom:
            - secretRef:
                name: firezone-env
            - secretRef:
                name: firezone-oidc
          securityContext:
            runAsUser: 0
            capabilities:
              # Phase 0 spike confirmed: SYS_ADMIN(setns ns), SYS_PTRACE(open
              # /proc/<pid>/ns/*), NET_ADMIN(overlay bootstrap `ip`).
              add: ["SYS_PTRACE", "SYS_ADMIN", "NET_ADMIN"]
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/oidc-reconcile-ok"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: oidc-reconcile-script
              mountPath: /opt/oidc-reconcile

