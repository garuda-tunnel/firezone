namespace: garuda
name: firezone
firezoneDir: /opt/garuda/firezone
# Required: consumer module supplies via var.server_fqdn. Empty default
# combined with values.schema.json minLength: 1 fails `helm install`
# fast when a deployment forgets to override.
serverFqdn: ""
# Required: consumer module supplies via var.client_subnet. Empty
# default fails fast (see schema minLength: 1).
clientSubnet: ""
# Required: derived from clientSubnet by the consumer module
# (cidrhost(var.client_subnet, 1)). Empty default fails fast.
wireguardIpv4Address: ""
wireguardIpv4Masquerade: false
wireguardIpv6Masquerade: false
wgListenPort: 51620
# Firezone telemetry phone-home (TELEMETRY_ENABLED, upstream default true).
# Disabled by default: a private VPN topology must not call out to
# ping.firez.one. Leaving it on produces a harmless but noisy
# `:nxdomain url=https://ping.firez.one` connectivity-check error in the
# firezone container logs because that endpoint has no public A/AAAA record.
telemetryEnabled: false
# Required: consumer module supplies via var.gateway_ref. Both empty
# strings combined with the schema's minLength fail fast.
gatewayRef:
  name: ""
  namespace: ""
nicAttach:
  - backbone
  - border
labels: {}
images:
  firezone: ""
  postgres: postgres:15
  frr: ""
  oidcReconcile: ""
# Required: consumer module supplies via var.admin_email. Empty default
# fails fast.
adminEmail: ""
# Required: consumer module supplies via var.admin_password. Empty
# default fails fast.
adminPassword: ""
secrets:
  guardianSecretKey: "placeholder_guardian"
  secretKeyBase: "placeholder_secret"
  liveViewSigningSalt: "placeholder_liveview"
  cookieSigningSalt: "placeholder_cookiesigning"
  cookieEncryptionSalt: "placeholder_cookieencryption"
  databaseEncryptionKey: "placeholder_dbencryption"
  databasePassword: "placeholder_dbpassword"
# ospf is null when omitted; FRR sidecar is then NOT rendered.
ospf: null
# transit.interfaces is the CSV ingress list for transit_watcher running
# inside the FRR sidecar. When non-empty, the deployment exports
# PBR_TRANSIT_TAG=201 (matches frr_injector/config.py:TRANSIT_TAG) and
# PBR_TRANSIT_INTERFACES — the sidecar entrypoint then launches
# transit_watcher.py automatically.
transit:
  interfaces: []
# OIDC reconcile. When oidc.providers is empty, no sidecar / Secret /
# shareProcessNamespace is rendered (OIDC off). When non-empty, the
# oidc-reconcile sidecar reconciles providers onto the running instance.
oidc:
  managed: merge
  providers: {}
# MSS clamp sidecar. Installs a separate `table inet firezone_mss` (DQ1: Firezone
# never does `nft flush ruleset`, so this table survives independently). Provides:
#   oifname "wg-firezone" clamp-to-pmtu  -- LOAD-BEARING return clamp (Chain-B SYN-ACK)
#   iifname "wg-firezone" fixed MSS      -- defense for inbound-initiated flows
# Sidecar shares pod netns (NET_ADMIN), writes /var/lib/clamp/ready, gates firezone Ready.
mssClamp:
  enabled: true
  # Fixed MSS for the iifname (inbound-initiated) direction.
  # Default = wg-firezone MTU(1280) - 40 = 1240. Must be >= QUIC 1200 floor.
  value: 1240
  # Sidecar image: empty => reuse the firezone container image (ships nftables).
  # Non-empty MUST be a digest-pinned ref (@sha256:<64-hex>). Floating tags rejected by schema.
  image: ""
  # DQ1: Firezone never global-flushes nft, so this is belt-and-braces only.
  # One-shot install on startup, then periodic existence-check (NOT reapply).
  checkIntervalSeconds: 300
