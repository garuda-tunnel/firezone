apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "firezone.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayRef.name | quote }}
      namespace: {{ .Values.gatewayRef.namespace | quote }}
  hostnames:
    - {{ .Values.serverFqdn | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.name | quote }}
          port: 13000
