{{- if .Values.oidc.providers }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-oidc
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "firezone.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full provider map (client_id, client_secret, metadata) as one JSON
  # object. The reconcile script does a single json.loads.
  OIDC_PROVIDERS_JSON: {{ .Values.oidc.providers | toJson | quote }}
{{- end }}
