apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-env
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "firezone.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Firezone Phoenix application env. This Secret is the source of truth for the firezone
  # container's environment (rendered directly from Helm values).
  EXTERNAL_URL: {{ printf "https://%s" .Values.serverFqdn | quote }}
  DEFAULT_ADMIN_EMAIL: {{ .Values.adminEmail | quote }}
  DEFAULT_ADMIN_PASSWORD: {{ .Values.adminPassword | quote }}
  WIREGUARD_IPV4_NETWORK: {{ .Values.clientSubnet | quote }}
  WIREGUARD_IPV4_ADDRESS: {{ .Values.wireguardIpv4Address | quote }}
  FZ_PORT: "13000"
  WIREGUARD_PORT: {{ .Values.wgListenPort | quote }}
  PHOENIX_SECURE_COOKIES: "true"
  TELEMETRY_ENABLED: {{ .Values.telemetryEnabled | quote }}
  WIREGUARD_IPV4_MASQUERADE: {{ .Values.wireguardIpv4Masquerade | quote }}
  WIREGUARD_IPV6_MASQUERADE: {{ .Values.wireguardIpv6Masquerade | quote }}
  GUARDIAN_SECRET_KEY: {{ .Values.secrets.guardianSecretKey | quote }}
  SECRET_KEY_BASE: {{ .Values.secrets.secretKeyBase | quote }}
  LIVE_VIEW_SIGNING_SALT: {{ .Values.secrets.liveViewSigningSalt | quote }}
  COOKIE_SIGNING_SALT: {{ .Values.secrets.cookieSigningSalt | quote }}
  COOKIE_ENCRYPTION_SALT: {{ .Values.secrets.cookieEncryptionSalt | quote }}
  DATABASE_ENCRYPTION_KEY: {{ .Values.secrets.databaseEncryptionKey | quote }}
  # Postgres connection. The chart provisions a single postgres container
  # in the same pod, reachable on 127.0.0.1 since both containers share
  # the pod's network namespace.
  DATABASE_HOST: "127.0.0.1"
  DATABASE_NAME: "firezone"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  POSTGRES_DB: "firezone"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
