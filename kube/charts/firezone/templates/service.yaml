apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "firezone.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "firezone.selector" . | nindent 4 }}
  ports:
    - name: admin-ui
      port: 13000
      targetPort: 13000
      protocol: TCP
